<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iJudge Local — PSCP Submission Helper</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=SF+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4f6f8;
    --panel: #ffffff;
    --border: #f1f5f9;
    --border-dark: #e2e8f0;
    --text: #111827;
    --muted: #6b7280;
    --primary: #de3561;
    --primary-dark: #be185d;
    --ok: #10b981;
    --ok-bg: #e6f7ed;
    --warn: #ffa726;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "IBM Plex Sans Thai", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  nav {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-left {
    display: flex;
    align-items: center;
    gap: 32px;
  }
  .logo {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
  }
  .logo .tag-char {
    color: var(--primary);
  }
  .nav-links {
    display: flex;
    gap: 8px;
    height: 64px;
    align-items: center;
  }
  .nav-link {
    text-decoration: none;
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 6px;
    transition: all 0.15s ease;
  }
  .nav-link.active {
    color: var(--primary);
    background: var(--bg);
  }
  .nav-link:hover:not(.active) {
    color: var(--text);
    background: var(--bg);
  }
  .nav-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .profile {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .profile-text {
    text-align: right;
    display: flex;
    flex-direction: column;
  }
  .profile-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
  }
  .profile-sub {
    font-size: 0.75rem;
    color: var(--muted);
  }
  .profile-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #e2e8f0;
    color: #475569;
    font-weight: 700;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--border-dark);
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
  }
  .header-sec {
    margin-bottom: 24px;
  }
  .breadcrumb {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .course-title {
    font-size: 2.25rem;
    font-weight: 700;
    margin: 0;
    color: var(--text);
  }
  .content-card {
    background: var(--panel);
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
    overflow: hidden;
  }
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .toolbar-left h3 {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
  }
  .toolbar-right {
    display: flex;
    gap: 10px;
  }
  button, .btn {
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 500;
    border: 1px solid var(--border-dark);
    background: var(--panel);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  button.primary, .btn.primary {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }
  button.primary:hover, .btn.primary:hover {
    background: var(--primary-dark);
  }
  button:hover:not(.primary) {
    background: var(--bg);
  }
  .table-responsive {
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
  }
  th {
    background: var(--bg);
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td {
    border-bottom: none;
  }
  tr:hover td {
    background: var(--bg);
  }
  .status-cell {
    width: 60px;
    text-align: center;
  }
  .status-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 0.75rem;
    font-weight: bold;
  }
  .status-icon.passed {
    background: var(--ok);
  }
  .status-icon.attempted {
    background: var(--muted);
  }
  .problem-title {
    color: var(--primary);
    font-weight: 700;
    font-size: 1.05rem;
    text-decoration: none;
    transition: color 0.15s ease;
    display: block;
    margin-bottom: 4px;
  }
  .problem-title:hover {
    text-decoration: underline;
    color: var(--primary-dark);
  }
  .problem-sub {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .problem-id {
    font-family: "SF Mono", monospace;
  }
  .badge {
    font-size: 0.75rem;
    font-weight: 500;
    padding: 1px 8px;
    border-radius: 4px;
    border: 1px solid var(--border-dark);
  }
  .badge.learning-log {
    background: var(--bg);
    color: var(--muted);
  }
  .difficulty-stars {
    color: var(--warn);
    font-size: 1.1rem;
    letter-spacing: -2px;
  }
  .difficulty-stars .empty-star {
    color: var(--border-dark);
  }
  .files-status {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .file-badge {
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 500;
    border: 1px solid var(--border-dark);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .file-badge.exists {
    background: var(--ok-bg);
    color: var(--ok);
    border-color: var(--ok);
  }
  .file-badge.missing {
    background: var(--bg);
    color: var(--muted);
  }
  .score-badge {
    font-size: 0.85rem;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 999px;
    display: inline-block;
  }
  .score-badge.passed {
    background: var(--ok-bg);
    color: var(--ok);
  }
  .score-badge.attempted {
    background: var(--bg);
    color: var(--muted);
  }
  .action-buttons {
    display: flex;
    gap: 6px;
  }
  .action-buttons button {
    padding: 6px 10px;
    font-size: 0.8rem;
    border-radius: 6px;
  }
  .action-buttons .btn-toggle {
    border-color: var(--border-dark);
  }
  .action-buttons .btn-submission {
    background: var(--panel);
    border-color: var(--primary);
    color: var(--primary);
  }
  .action-buttons .btn-submission:hover {
    background: var(--primary);
    color: white;
  }
  .action-buttons .btn-reflection {
    background: var(--panel);
    border-color: var(--muted);
    color: var(--muted);
  }
  .action-buttons .btn-reflection:hover {
    background: var(--muted);
    color: white;
  }
  dialog {
    border: none;
    border-radius: 16px;
    padding: 0;
    background: var(--panel);
    color: var(--text);
    width: min(720px, 92vw);
    max-height: 88vh;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    animation: slideUp 0.25s ease-out;
  }
  dialog::backdrop {
    background: rgba(17, 24, 39, 0.5);
    backdrop-filter: blur(4px);
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .dialog-body {
    padding: 24px;
    overflow-y: auto;
    max-height: 88vh;
  }
  .dialog-body h2 {
    margin-top: 0;
    font-size: 1.5rem;
    font-weight: 700;
    border-bottom: 2px solid var(--border);
    padding-bottom: 12px;
    color: var(--text);
  }
  .dialog-body h4 {
    margin: 24px 0 10px;
    color: var(--primary);
    font-size: 1.1rem;
    font-weight: 600;
    border-left: 3px solid var(--primary);
    padding-left: 8px;
  }
  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--muted);
    margin: 12px 0 6px;
  }
  input[type=text], textarea, select {
    width: 100%;
    font-family: inherit;
    font-size: 0.95rem;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border-dark);
    background: var(--panel);
    color: var(--text);
    transition: all 0.15s ease;
  }
  input[type=text]:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(222, 53, 97, 0.15);
  }
  textarea {
    min-height: 80px;
    resize: vertical;
  }
  .row {
    display: flex;
    gap: 16px;
  }
  .row > div {
    flex: 1;
  }
  .checklist {
    margin-top: 14px;
  }
  .checklist label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
    color: var(--text);
    font-weight: 400;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .checklist label:hover {
    background: var(--border);
  }
  .checklist input[type=checkbox] {
    width: 18px;
    height: 18px;
    accent-color: var(--primary);
    cursor: pointer;
  }
  .dialog-actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 28px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .dialog-actions button {
    padding: 10px 20px;
  }
  .hint {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .empty {
    color: var(--muted);
    padding: 60px 0;
    text-align: center;
    font-size: 1rem;
  }
</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <a href="#" class="logo"><span class="tag-char">&lt;i</span>Judge<span class="tag-char">&gt;</span></a>
    <div class="nav-links">
      <a href="#" class="nav-link active">Problems</a>
      <a href="#" class="nav-link">Submissions</a>
      <a href="#" class="nav-link">Contests</a>
      <a href="#" class="nav-link">Rankings</a>
      <a href="#" class="nav-link">Help</a>
    </div>
  </div>
  <div class="nav-right">
    <span class="hint" id="status" style="margin:0; font-family:monospace;"></span>
    <div class="profile">
      <div class="profile-text">
        <span class="profile-name">Chatan Petry</span>
        <span class="profile-sub">@it69070027</span>
      </div>
      <div class="profile-avatar">CP</div>
    </div>
  </div>
</nav>

<main>
  <div class="header-sec">
    <div class="breadcrumb">Courses / [2026] Problem Solving and Computer Programming (IT)</div>
    <h1 class="course-title">Problems</h1>
  </div>

  <div class="content-card">
    <div class="toolbar">
      <div class="toolbar-left">
        <h3>รายการโจทย์ (Problems List)</h3>
      </div>
      <div class="toolbar-right">
        <button class="primary" id="btn-new">+ เพิ่มโจทย์ใหม่</button>
        <button id="btn-refresh">รีเฟรช</button>
      </div>
    </div>

    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th class="status-cell">สถานะ</th>
            <th>ชื่อโจทย์</th>
            <th>ความยาก</th>
            <th>ความพร้อมไฟล์ (Files)</th>
            <th>คะแนน</th>
            <th>จัดการ</th>
          </tr>
        </thead>
        <tbody id="grid">
          <!-- Populated by JavaScript -->
        </tbody>
      </table>
    </div>
  </div>
</main>

<dialog id="dlg-new">
  <div class="dialog-body">
    <h2>เพิ่มโจทย์ใหม่</h2>
    <div class="row">
      <div><label>OJ ID (4 หลัก)</label><input type="text" id="new-id" placeholder="3030" /></div>
      <div><label>ชื่อโจทย์</label><input type="text" id="new-name" placeholder="Coke" /></div>
    </div>
    <div class="checklist">
      <label><input type="checkbox" id="new-log" /> Learning-log required</label>
      <label><input type="checkbox" id="new-mainpy" checked /> สร้าง main.py เปล่า (template main())</label>
    </div>
    <div class="dialog-actions">
      <button data-close>ยกเลิก</button>
      <button class="primary" id="new-create">สร้างโฟลเดอร์</button>
    </div>
  </div>
</dialog>

<dialog id="dlg-submission">
  <div class="dialog-body" id="submission-form"></div>
</dialog>

<dialog id="dlg-reflection">
  <div class="dialog-body" id="reflection-form"></div>
</dialog>

<script>
const $ = (sel, el=document) => el.querySelector(sel);
const $$ = (sel, el=document) => [...el.querySelectorAll(sel)];

async function api(path, method='GET', body) {
  const res = await fetch(path, {
    method,
    headers: body ? {'Content-Type': 'application/json'} : undefined,
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'request failed');
  return data;
}

function getDifficultyStars(id) {
  const problemId = parseInt(id) || 0;
  // Deterministic mock difficulty rating
  const rating = (problemId % 3) + 1; 
  let stars = '';
  for (let i = 1; i <= 5; i++) {
    if (i <= rating) {
      stars += '★';
    } else {
      stars += '<span class="empty-star">☆</span>';
    }
  }
  return stars;
}

async function loadProblems() {
  const { problems } = await api('/api/problems');
  const grid = $('#grid');
  if (!problems.length) {
    grid.innerHTML = '<tr><td colspan="6" class="empty">ยังไม่มีโฟลเดอร์ oj/ — กด "เพิ่มโจทย์ใหม่" ด้านบนเพื่อเริ่มทำโจทย์</td></tr>';
    return;
  }
  grid.innerHTML = problems.map(p => {
    const statusClass = p.passed ? 'passed' : 'attempted';
    const statusChar = p.passed ? '✓' : '✖';
    const scoreClass = p.passed ? 'passed' : 'attempted';
    const scoreText = p.passed ? '100' : '0';
    
    return `
      <tr data-folder="${encodeURIComponent(p.folder)}">
        <td class="status-cell">
          <div class="status-icon ${statusClass}" title="${p.passed ? 'Passed' : 'Attempted'}">
            ${statusChar}
          </div>
        </td>
        <td>
          <a href="#" class="problem-title" onclick="openSubmissionForm('${p.folder}'); return false;">${p.name}</a>
          <div class="problem-sub">
            <span class="problem-id">#${p.id}</span>
            ${p.learning_log ? '<span class="badge learning-log">Learning Log</span>' : ''}
          </div>
        </td>
        <td>
          <div class="difficulty-stars">${getDifficultyStars(p.id)}</div>
        </td>
        <td>
          <div class="files-status">
            <span class="file-badge ${p.has_main ? 'exists' : 'missing'}">main.py</span>
            <span class="file-badge ${p.has_submission ? 'exists' : 'missing'}">submission.md</span>
            ${p.learning_log ? `<span class="file-badge ${p.has_reflection ? 'exists' : 'missing'}">reflection.md</span>` : ''}
          </div>
        </td>
        <td>
          <span class="score-badge ${scoreClass}">${scoreText}</span>
        </td>
        <td>
          <div class="action-buttons">
            <button class="btn-toggle" title="สลับสถานะผ่าน/ไม่ผ่าน">${p.passed ? 'ยกเลิก Pass' : 'Mark Pass'}</button>
            <button class="btn-submission">submission</button>
            ${p.learning_log ? '<button class="btn-reflection">reflection</button>' : ''}
            ${!p.has_main ? '<button class="btn-mainpy">+ main.py</button>' : ''}
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

$('#btn-refresh').addEventListener('click', loadProblems);

$('#btn-new').addEventListener('click', () => $('#dlg-new').showModal());
$$('dialog [data-close]').forEach(b => b.addEventListener('click', () => b.closest('dialog').close()));

$('#new-create').addEventListener('click', async () => {
  const id = $('#new-id').value.trim();
  const name = $('#new-name').value.trim();
  const learning_log = $('#new-log').checked;
  const with_main_py = $('#new-mainpy').checked;
  try {
    await api('/api/problems', 'POST', { id, name, learning_log, with_main_py });
    $('#dlg-new').close();
    $('#new-id').value = ''; $('#new-name').value = '';
    await loadProblems();
  } catch (e) { alert(e.message); }
});

$('#grid').addEventListener('click', async (ev) => {
  const tr = ev.target.closest('tr');
  if (!tr) return;
  const folder = decodeURIComponent(tr.dataset.folder);
  if (ev.target.classList.contains('btn-toggle')) {
    await api(`/api/problems/${encodeURIComponent(folder)}/toggle-passed`, 'POST', {});
    await loadProblems();
  } else if (ev.target.classList.contains('btn-mainpy')) {
    await api(`/api/problems/${encodeURIComponent(folder)}/main-py`, 'POST', {});
    await loadProblems();
  } else if (ev.target.classList.contains('btn-submission')) {
    openSubmissionForm(folder);
  } else if (ev.target.classList.contains('btn-reflection')) {
    openReflectionForm(folder);
  }
});

function textField(id, labelText, hint) {
  return `<label for="${id}">${labelText}</label>${hint ? `<div class="hint">${hint}</div>` : ''}<textarea id="${id}"></textarea>`;
}

function openSubmissionForm(folder) {
  const f = $('#submission-form');
  f.innerHTML = `
    <h2>submission.md — ${folder}</h2>
    <p class="hint">พิมพ์เนื้อหาของตัวเองเท่านั้น ระบบมีหน้าที่จัดฟอร์แมตโครงสร้างไฟล์ Markdown ตามกติกาอย่างถูกต้องเท่านั้น (ไม่มีการแต่งเติมหรือวิเคราะห์โจทย์เอง)</p>

    <h4>1. ข้อมูล OJ</h4>
    <div class="row">
      <div>${textField('oj_title', 'หมายเลข/ชื่อโจทย์ OJ')}</div>
      <div>${textField('submission_id', 'OJ submission ID (ถ้ามี)')}</div>
    </div>
    <label>สถานะ OJ</label>
    <select id="oj_status"><option>Pass</option><option>Not Pass</option><option>Not Submit</option></select>
    ${textField('time_spent', 'เวลาที่ใช้คิดและทำโจทย์ด้วยตนเอง', 'เช่น "15-30 minutes", "1-2 hours"')}

    <h4>2. ความเข้าใจโจทย์ของฉัน</h4>
    ${textField('understanding', 'อธิบายโจทย์ด้วยคำพูดของตนเอง (input/output/constraints)')}

    <h4>3. แผนแรกของฉัน</h4>
    ${textField('first_plan', 'แผนการออกแบบและการโปรแกรมก่อนขอความช่วยเหลือหรือใช้ตัวช่วยใด ๆ')}

    <h4>4. วิธีสุดท้ายที่ใช้จริง</h4>
    ${textField('final_approach', 'algorithm/แนวคิดวิธีเขียนโปรแกรมที่ส่งในระบบจริง')}

    <h4>5. การทดสอบของฉัน (อย่างน้อย 3 กรณี)</h4>
    ${[1,2,3].map(n => `
      <div class="row">
        <div style="flex: 2">${textField('t'+n+'_why', `Test ${n} — ทำไมเลือก case นี้`)}</div>
        <div><label for="t${n}_result">Test ${n} — Result</label><select id="t${n}_result"><option>Pass</option><option>Not Pass</option></select></div>
      </div>
      <div class="row">
        <div>${textField('t'+n+'_input', `Test ${n} — Input`)}</div>
        <div>${textField('t'+n+'_expected', `Test ${n} — Expected output`)}</div>
        <div>${textField('t'+n+'_actual', `Test ${n} — Actual output`)}</div>
      </div>
    `).join('')}

    <h4>6. การใช้ AI</h4>
    <label for="used_ai">ใช้ AI กับโจทย์นี้หรือไม่</label>
    <select id="used_ai"><option>No</option><option>Yes</option></select>

    <h4>7. ความช่วยเหลือจากคน / การร่วมมือ</h4>
    <label for="human_help">ได้ถามเพื่อน/TA/ผู้สอนหรือไม่</label>
    <select id="human_help"><option>No</option><option>Yes</option></select>
    <div class="row">
      <div>${textField('who_helped', 'ใครช่วยคุณ')}</div>
      <div>${textField('what_help', 'เขาช่วยในจุดใด')}</div>
    </div>
    ${textField('still_own_work', 'จุดที่คุณทำเองโดยไม่มีคนช่วย')}
    <label for="copied_code">คุณคัดลอก code จากคนอื่นหรือไม่</label>
    <select id="copied_code"><option>No</option><option>Yes</option></select>

    <h4>8. คำรับรองของนักศึกษา</h4>
    <div class="checklist" id="cert-list"></div>

    <div class="dialog-actions">
      <button data-close>ยกเลิก</button>
      <button class="primary" id="submission-save">บันทึก submission.md</button>
    </div>
  `;
  const certList = $('#cert-list');
  const statements = [
    "I wrote this submission in my own words.",
    "I understand my final code.",
    "I recorded the real OJ status.",
    "I did not copy AI-generated text directly into this file.",
    "I did not copy code from another person.",
    "If I received human help, I disclosed it in this file.",
    "I submitted the final code to the OJ by myself.",
  ];
  certList.innerHTML = statements.map((s, i) => `<label><input type="checkbox" class="cert" data-s="${i}" /> ${s}</label>`).join('');

  f.querySelector('[data-close]').addEventListener('click', () => $('#dlg-submission').close());
  $('#submission-save').addEventListener('click', async () => {
    const val = id => $('#'+id).value;
    const certifications = {};
    statements.forEach((s, i) => { certifications[s] = $(`.cert[data-s="${i}"]`).checked; });
    const payload = {
      oj_title: val('oj_title'), submission_id: val('submission_id'), oj_status: val('oj_status'),
      time_spent: val('time_spent'), understanding: val('understanding'), first_plan: val('first_plan'),
      final_approach: val('final_approach'),
      t1_why: val('t1_why'), t1_input: val('t1_input'), t1_expected: val('t1_expected'), t1_actual: val('t1_actual'), t1_result: val('t1_result'),
      t2_why: val('t2_why'), t2_input: val('t2_input'), t2_expected: val('t2_expected'), t2_actual: val('t2_actual'), t2_result: val('t2_result'),
      t3_why: val('t3_why'), t3_input: val('t3_input'), t3_expected: val('t3_expected'), t3_actual: val('t3_actual'), t3_result: val('t3_result'),
      used_ai: val('used_ai'), human_help: val('human_help'), who_helped: val('who_helped'),
      what_help: val('what_help'), still_own_work: val('still_own_work'), copied_code: val('copied_code'),
      certifications,
    };
    try {
      await api(`/api/problems/${encodeURIComponent(folder)}/submission`, 'POST', payload);
      $('#dlg-submission').close();
      await loadProblems();
    } catch (e) { alert(e.message); }
  });
  $('#dlg-submission').showModal();
}

function openReflectionForm(folder) {
  const f = $('#reflection-form');
  const policyStatements = [
    "I read the relevant workflow before using AI.",
    "I used `instructions/COURSE_AI_INSTRUCTIONS.md`, `instructions/AGENTS.md`, or manually followed the course AI instructions if the tool did not support custom instructions.",
    "I wrote my own problem understanding before asking AI for help.",
    "I wrote my own first plan before asking AI for help.",
    "I used AI as a coach, reviewer, debugger, or test-case helper, not as a full-answer generator.",
  ];
  const certStatements = [
    "I wrote this reflection in my own words.",
    "This reflection describes my real AI use.",
    "I checked AI's suggestions before using them.",
    "I can explain my final code.",
    "I did not ask AI to write this reflection for me.",
  ];
  f.innerHTML = `
    <h2>ai_reflection.md — ${folder}</h2>
    <p class="hint">ใช้สำหรับบันทึกการใช้ประโยชน์จาก AI และสิ่งที่เรียนรู้จริง (ต้องเขียนเนื้อความด้วยภาษาตนเอง ห้ามวาง Chat Log)</p>

    <h4>1. ข้อมูล OJ</h4>
    <div class="row">
      <div>${textField('r_oj_title', 'OJ problem number/title')}</div>
      <div>${textField('r_submission_id', 'OJ submission ID')}</div>
    </div>
    <label>OJ status</label>
    <select id="r_oj_status"><option>Pass</option><option>Not Pass</option><option>Not Submit</option></select>

    <h4>2. เครื่องมือ AI ที่ใช้</h4>
    ${textField('ai_tool', 'ชื่อเครื่องมือ AI และ Agent (เช่น Claude Code, Gemini)')}

    <h4>3. การตรวจสอบนโยบายการใช้ AI ของรายวิชา</h4>
    <div id="policy-list"></div>
    ${textField('policy_no_explain', 'หากมีข้อใดตอบ "No" กรุณาให้คำอธิบายเหตุผล')}

    <h4>4. ฉันถาม AI ให้ช่วยอะไร</h4>
    ${textField('what_asked', 'รายละเอียดคำสั่ง/คำถามที่ใช้')}

    <h4>5. AI ช่วยให้ฉันสังเกตอะไร</h4>
    ${textField('what_noticed', 'ข้อคิดหรือจุดผิดพลาดที่ AI ช่วยค้นพบ')}

    <h4>6. ฉันตรวจสอบหรือแก้อะไรด้วยตนเอง</h4>
    ${textField('what_checked', 'การตรวจสอบความถูกต้องและปรับแต่งด้วยฝีมือคุณเอง')}

    <h4>7. ฉันได้เรียนรู้อะไร</h4>
    ${textField('what_learned', 'ความรู้ใหม่ที่ได้รับเกี่ยวกับการแก้ปัญหาหรือการเขียนโปรแกรม')}

    <h4>8. คำรับรองของนักศึกษา</h4>
    <div class="checklist" id="r-cert-list"></div>

    <div class="dialog-actions">
      <button data-close>ยกเลิก</button>
      <button class="primary" id="reflection-save">บันทึก ai_reflection.md</button>
    </div>
  `;
  const policyList = $('#policy-list');
  policyList.innerHTML = policyStatements.map((s, i) => `
    <div class="row" style="align-items:center;margin-bottom:8px; gap: 12px;">
      <div style="flex:2.5"><span class="hint" style="margin:0; font-size:0.85rem; color:var(--text);">${s}</span></div>
      <div style="flex:1"><select class="policy-answer" data-s="${i}"><option>Yes</option><option>No</option><option>Not Applicable</option></select></div>
      <div style="flex:2"><input type="text" class="policy-note" data-s="${i}" placeholder="บันทึกสั้น ๆ (short note)" /></div>
    </div>
  `).join('');
  $('#r-cert-list').innerHTML = certStatements.map((s, i) => `<label><input type="checkbox" class="r-cert" data-s="${i}" /> ${s}</label>`).join('');

  f.querySelector('[data-close]').addEventListener('click', () => $('#dlg-reflection').close());
  $('#reflection-save').addEventListener('click', async () => {
    const val = id => $('#'+id).value;
    const policy = {};
    policyStatements.forEach((s, i) => {
      policy[s] = {
        answer: $(`.policy-answer[data-s="${i}"]`).value,
        note: $(`.policy-note[data-s="${i}"]`).value,
      };
    });
    const certifications = {};
    certStatements.forEach((s, i) => { certifications[s] = $(`.r-cert[data-s="${i}"]`).checked; });
    const payload = {
      info: {
        'OJ problem number/title': val('r_oj_title'),
        'OJ submission ID, if submitted': val('r_submission_id'),
        'OJ status': val('r_oj_status'),
      },
      ai_tool: val('ai_tool'),
      policy,
      policy_no_explain: val('policy_no_explain'),
      what_asked: val('what_asked'),
      what_noticed: val('what_noticed'),
      what_checked: val('what_checked'),
      what_learned: val('what_learned'),
      certifications,
    };
    try {
      await api(`/api/problems/${encodeURIComponent(folder)}/reflection`, 'POST', payload);
      $('#dlg-reflection').close();
      await loadProblems();
    } catch (e) { alert(e.message); }
  });
  $('#dlg-reflection').showModal();
}

loadProblems().catch(e => { $('#status').textContent = 'Error: ' + e.message; });
</script>
</body>
</html>
